name: CI

on:
  push:
    branches:
      - main
      - "v*"
      - "feature/**"
      - "fix/**"
  pull_request:

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go Test
        run: go test ./...

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Absolute Path Checks
        run: |
          python3 scripts/check_no_absolute_paths.py
          python3 scripts/test_check_no_absolute_paths.py

      - name: GitHub Issue Skill Script Tests
        run: |
          python3 .agents/skills/github-issue-create/scripts/test_create_github_issue.py
          python3 .agents/skills/issue-intake/scripts/test_fetch_github_issue.py
          python3 .agents/skills/github-issue-progress-sync/scripts/test_post_github_issue_comment.py
          python3 .agents/skills/github-issue-close/scripts/test_close_github_issue.py

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Web
        run: |
          cd web
          npm ci
          npm run build

  deploy-validate:
    name: Deploy Config Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose Config
        run: |
          cp deploy/athena.env.example deploy/athena.env
          docker compose --env-file deploy/athena.env -f deploy/docker-compose.cloud.yml config >/tmp/athena-compose.rendered.yml
          rm -f deploy/athena.env
          test -s /tmp/athena-compose.rendered.yml

  release-bundle:
    name: Release Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Release Bundle
        run: |
          bash -n scripts/build_release_bundle.sh scripts/deploy_cloud.sh
          scripts/build_release_bundle.sh
