id: general_answer
name: General Answer Contract
summary: Structured answer contract for the default scene
kind: output

required_fields:
  - main_answer

properties:
  main_answer:
    type: string
  summary:
    type: string
  next_questions:
    type: array

validation_rules:
  - contract_rule.main_answer_required

completion_rules:
  - contract_rule.main_answer_non_empty
