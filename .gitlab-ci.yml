workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - 校验
  - 构建

default:
  interruptible: true

variables:
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

.go_test_template:
  stage: 校验
  image: golang:1.26-bookworm
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/go-build/
      - .cache/go-mod/
  script:
    - go version
    - go test ./...

.repo_hygiene_template:
  stage: 校验
  image: python:3.13-slim
  script:
    - python3 scripts/check_no_absolute_paths.py
    - python3 scripts/test_check_no_absolute_paths.py
    - python3 .agents/skills/gitlab-issue-progress-sync/scripts/test_post_gitlab_issue_note.py

.web_build_template:
  stage: 校验
  image: node:22-bookworm-slim
  cache:
    key: "web-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/npm/
  script:
    - cd web
    - npm ci
    - npm run build
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - web/dist/

.deploy_validate_template:
  stage: 校验
  image: docker:27.5.1-cli
  before_script:
    - docker compose version
  script:
    - cp deploy/athena.env.example deploy/athena.env
    - docker compose --env-file deploy/athena.env -f deploy/docker-compose.cloud.yml config >/tmp/athena-compose.rendered.yml
    - rm -f deploy/athena.env
    - test -s /tmp/athena-compose.rendered.yml

.release_bundle_template:
  stage: 构建
  image: golang:1.26-bookworm
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/go-build/
      - .cache/go-mod/
  script:
    - bash -n scripts/build_release_bundle.sh scripts/deploy_cloud.sh
    - scripts/build_release_bundle.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - output/release/

Go 测试:
  extends: .go_test_template

绝对路径校验:
  extends: .repo_hygiene_template

Web 构建:
  extends: .web_build_template

部署配置校验:
  extends: .deploy_validate_template

发布包构建:
  extends: .release_bundle_template
